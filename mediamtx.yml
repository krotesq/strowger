# MediaMTX – Strowger Restreaming Platform
# Reference: https://github.com/bluenviron/mediamtx/blob/main/mediamtx.yml

logLevel: info
logDestinations: [stdout]

# Authentication – open access (lock down for production)
authMethod: internal
authInternalUsers:
  - user: any
    pass:
    ips: []
    permissions:
      - action: publish
      - action: read
      - action: playback
      - action: api
      - action: metrics

# Control API
api: yes
apiAddress: :9997
apiAllowOrigins: ["*"]

# Prometheus metrics
metrics: yes
metricsAddress: :9998

# RTSP
rtsp: yes
rtspAddress: :8554
rtspTransports: [udp, multicast, tcp]
rtpAddress: :8000
rtcpAddress: :8001

# RTMP
rtmp: yes
rtmpAddress: :1935

# HLS
hls: yes
hlsAddress: :8888
hlsVariant: lowLatency
hlsAllowOrigins: ["*"]

# WebRTC
webrtc: yes
webrtcAddress: :8889
webrtcLocalUDPAddress: :8189
webrtcAllowOrigins: ["*"]

# SRT
srt: yes
srtAddress: :8890

# Paths
pathDefaults:
  record: false

paths:
  all_others:
